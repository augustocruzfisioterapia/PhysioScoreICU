<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PhysioScore ICU</title>
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="Plataforma de avaliação funcional para pacientes críticos.">
    <meta name="theme-color" content="#0B1D3A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="PhysioScore ICU">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PhysioScore">
    <meta name="format-detection" content="telephone=no">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <style>
        :root {
            --bg: #f6f8fb; --surface: #ffffff; --surface2: #f1f4f9;
            --text: #1a1d26; --text2: #5a6170; --text3: #8b919e; --border: #e2e6ed;
            --accent: #0d9488; --accent2: #14b8a6; --accent-light: #e6f7f5;
            --accent-glow: rgba(13,148,136,0.15); --danger: #e5534b; --danger-bg: #fdf0ef;
            --warning: #d4a017; --warning-bg: #fef9e7; --success: #2d8a56; --success-bg: #edf7f1;
            --info: #3b6fb6; --info-bg: #eaf1fb; --radius: 14px; --radius-sm: 10px; --radius-xs: 7px;
            --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        .dark {
            --bg: #0f1419; --surface: #1a2129; --surface2: #222b35;
            --text: #e6edf3; --text2: #9ba9b8; --text3: #6b7888; --border: #2d3748;
            --accent: #2dd4bf; --accent2: #5eead4; --accent-light: #0d2e2a;
            --accent-glow: rgba(45,212,191,0.2); --danger: #f87171; --danger-bg: #3b1a1a;
            --warning: #facc15; --warning-bg: #3b2f0a; --success: #4ade80; --success-bg: #0d2e1a;
            --info: #60a5fa; --info-bg: #1a2744;
            --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; transition: background 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
        .app-shell { max-width: 820px; margin: 0 auto; padding: 12px 16px 40px; min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); position: sticky; top: 10px; z-index: 100; margin-bottom: 14px; flex-wrap: wrap; }
        .logo-area { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; flex: 1; min-width: 120px; }
        .logo-icon { width: 38px; height: 38px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; flex-shrink: 0; }
        .logo-text { font-weight: 700; font-size: 1rem; color: var(--text); letter-spacing: -0.2px; }
        .logo-sub { font-size: 0.68rem; color: var(--text3); font-weight: 500; }
        .topbar-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.82rem; font-weight: 500; transition: var(--transition); white-space: nowrap; font-family: var(--font); user-select: none; text-decoration: none; }
        .btn:active { transform: scale(0.96); }
        .btn:hover { border-color: var(--accent); box-shadow: var(--shadow); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
        .btn-primary:hover { background: var(--accent2); }
        .btn-accent-outline { border-color: var(--accent); color: var(--accent); font-weight: 600; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; border-radius: 16px; }
        .btn-xs { padding: 4px 10px; font-size: 0.7rem; border-radius: 14px; }
        .btn-ghost { background: transparent; border-color: transparent; }
        .btn-ghost:hover { background: var(--surface2); border-color: transparent; }
        .btn-danger { color: var(--danger); border-color: #fecaca; background: var(--danger-bg); }
        .btn-link { color: var(--info); border-color: transparent; background: var(--info-bg); font-size: 0.68rem; padding: 4px 10px; }
        .btn-link:hover { border-color: var(--info); }
        .btn-block { width: 100%; justify-content: center; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .card-header { font-weight: 700; font-size: 0.9rem; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .patient-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; transition: var(--transition); margin-bottom: 5px; }
        .patient-row:hover { border-color: var(--accent); background: var(--surface); }
        .pat-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; flex-shrink: 0; }
        .pat-name { font-weight: 600; font-size: 0.88rem; flex: 1; }
        .pat-bed { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
        input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-xs); background: var(--surface); color: var(--text); font-size: 0.88rem; font-family: var(--font); transition: var(--transition); margin-bottom: 8px; -webkit-appearance: none; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        textarea { resize: vertical; min-height: 70px; }
        label { font-weight: 600; font-size: 0.72rem; color: var(--text2); display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
        .scorer-container { background: var(--surface2); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
        .scorer-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
        .scorer-title { font-weight: 700; font-size: 0.9rem; color: var(--accent); }
        .scorer-title small { display: block; font-weight: 400; font-size: 0.68rem; color: var(--text3); }
        .scorer-subtitle { font-size: 0.7rem; color: var(--text3); margin-bottom: 12px; line-height: 1.4; }
        .scorer-links { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
        .scorer-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; margin-bottom: 6px; border-radius: var(--radius-xs); background: var(--surface); border: 1px solid var(--border); transition: var(--transition); gap: 10px; flex-wrap: wrap; }
        .scorer-item:hover { border-color: var(--accent); }
        .scorer-item.filled { border-color: var(--accent); background: var(--accent-light); }
        .scorer-label { font-size: 0.78rem; font-weight: 500; flex: 1; min-width: 120px; color: var(--text); }
        .scorer-label small { display: block; font-weight: 400; color: var(--text3); font-size: 0.68rem; margin-top: 2px; }
        .scorer-radio { display: flex; gap: 2px; flex-wrap: wrap; }
        .radio-opt { padding: 5px 10px; border-radius: 14px; font-size: 0.7rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); transition: var(--transition); user-select: none; white-space: nowrap; }
        .radio-opt:hover { border-color: var(--accent); color: var(--text); }
        .radio-opt.selected { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
        .scorer-radio-vertical { display: flex; flex-direction: column; gap: 3px; width: 100%; margin-top: 6px; }
        .radio-opt-vertical { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.78rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); transition: var(--transition); user-select: none; text-align: left; line-height: 1.3; }
        .radio-opt-vertical:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }
        .radio-opt-vertical.selected { background: var(--accent-light); color: var(--accent); border-color: var(--accent); font-weight: 600; }
        .scorer-result { text-align: right; font-weight: 700; font-size: 1.3rem; color: var(--accent); padding: 8px 14px; background: var(--surface); border-radius: var(--radius-xs); border: 1px solid var(--border); min-width: 60px; }
        .interpretation-box { margin-top: 10px; padding: 12px 14px; background: var(--info-bg); border-radius: var(--radius-sm); border: 1px solid var(--info); font-size: 0.75rem; color: var(--info); line-height: 1.5; }
        /* Seções expansíveis */
        .perme-section { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; background: var(--surface); }
        .perme-section-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; font-weight: 600; font-size: 0.8rem; background: var(--surface2); transition: var(--transition); user-select: none; }
        .perme-section-header:hover { background: var(--bg); }
        .perme-section-header .section-icon { font-size: 1.2rem; }
        .perme-section-header .section-subtotal { margin-left: auto; font-size: 0.7rem; color: var(--accent); font-weight: 700; }
        .perme-section-header .section-arrow { transition: transform 0.2s; font-size: 0.7rem; color: var(--text3); }
        .perme-section-header.open .section-arrow { transform: rotate(90deg); }
        .perme-section-body { padding: 0 14px 10px; display: none; }
        .perme-section-body.open { display: block; }
        .progress-bar-container { background: var(--border); border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
        .progress-low { background: var(--danger); }
        .progress-mid { background: var(--warning); }
        .progress-high { background: var(--success); }
        .subtotal-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 6px; margin-top: 10px; }
        .subtotal-card { text-align: center; padding: 8px; background: var(--surface); border-radius: var(--radius-xs); border: 1px solid var(--border); font-size: 0.65rem; }
        .subtotal-card .sub-val { font-size: 1rem; font-weight: 700; color: var(--accent); }
        .subtotal-card .sub-max { font-size: 0.6rem; color: var(--text3); }
        .perme-final-result { margin-top: 14px; padding: 18px; border-radius: var(--radius); border: 2px solid var(--accent); background: var(--accent-light); text-align: center; box-shadow: var(--shadow); }
        .perme-final-result .perme-final-label { font-size: 0.74rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
        .perme-final-result .perme-final-score { font-size: 3rem; line-height: 1; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .perme-final-result .perme-final-max { font-size: 1rem; font-weight: 700; color: var(--text2); margin-left: 3px; }
        .perme-final-result .perme-final-classification { margin-top: 8px; font-size: 0.82rem; font-weight: 600; color: var(--text); }
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .tool-card { padding: 12px; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; text-align: center; border: 2px solid transparent; transition: var(--transition); font-weight: 600; font-size: 0.78rem; position: relative; }
        .tool-card:hover { border-color: var(--accent); background: var(--surface); box-shadow: var(--shadow); }
        .tool-card.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
        .tool-card .tool-emoji { font-size: 1.3rem; display: block; margin-bottom: 3px; }
        .tool-card .tool-fullname { display: block; font-size: 0.6rem; font-weight: 400; color: var(--text3); margin-top: 1px; }
        .tool-card .tool-check { position: absolute; top: -6px; right: -6px; background: var(--success); color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .tabs-row { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
        .tab-item { padding: 9px 14px; cursor: pointer; font-weight: 600; font-size: 0.76rem; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -4px; white-space: nowrap; transition: var(--transition); border-radius: 8px 8px 0 0; }
        .tab-item:hover { color: var(--text); background: var(--surface2); }
        .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-up { background: var(--success-bg); color: var(--success); }
        .badge-down { background: var(--danger-bg); color: var(--danger); }
        .badge-stable { background: var(--warning-bg); color: var(--warning); }
        .highlight-box { background: var(--accent-light); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 16px; text-align: center; margin-bottom: 14px; }
        .highlight-box h3 { margin-bottom: 4px; font-size: 1rem; color: var(--accent); }
        .highlight-box p { font-size: 0.8rem; color: var(--text2); margin-bottom: 10px; }
        .disclaimer-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 0.7rem; color: #92400e; margin-bottom: 12px; line-height: 1.4; }
        .dark .disclaimer-box { background: #422006; border-color: #713f12; color: #fcd34d; }
        .app-footer { margin-top: auto; padding: 16px 0 8px; text-align: center; font-size: 0.72rem; color: var(--text3); }
        .app-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .modal { background: var(--surface); border-radius: var(--radius); padding: 20px; max-width: 650px; width: 100%; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
        .modal h3 { margin-bottom: 14px; font-size: 1rem; }
        .hidden { display: none !important; }
        .empty-msg { text-align: center; padding: 30px; color: var(--text3); }
        .mt-4 { margin-top: 4px; } .mt-8 { margin-top: 8px; } .mb-8 { margin-bottom: 8px; }
        .gap-8 { gap: 8px; } .flex-wrap { display: flex; flex-wrap: wrap; }
        .text-sm { font-size: 0.78rem; } .text-xs { font-size: 0.68rem; } .text-muted { color: var(--text3); }
        .chart-container { position: relative; width: 100%; max-width: 400px; margin: 10px auto; }
        .chart-container canvas { width: 100% !important; height: auto !important; }
        .line-chart-container { position: relative; width: 100%; max-width: 600px; margin: 10px auto; height: 200px; }
        .radar-legend { display: flex; gap: 16px; justify-content: center; font-size: 0.7rem; margin-top: 8px; color: var(--text2); }
        .radar-legend span { display: flex; align-items: center; gap: 4px; }
        .radar-legend .legend-dash { width: 16px; height: 2px; border-top: 2px dashed rgba(13,148,136,0.5); }
        .radar-legend .legend-solid { width: 16px; height: 2px; background: #0d9488; }
        @media print { .topbar, .app-footer, .btn, .modal-overlay { display: none !important; } .card { box-shadow: none; border: 1px solid #ccc; } body { background: #fff; color: #000; } }
    </style>
</head>
<body>
    <div class="app-shell" id="appRoot">
        <header class="topbar">
            <div class="logo-area" id="logoHome"><div class="logo-icon">📊</div><div><div class="logo-text">PhysioScore ICU</div><div class="logo-sub">O app do Fisioterapeuta da UTI</div></div></div>
            <div class="topbar-actions"><button class="btn btn-sm btn-ghost" id="btnHome" title="Home">🏠</button><button class="btn btn-sm" id="darkToggle" title="Modo claro/noturno">🌙</button></div>
        </header>
        <main id="mainContent" style="flex:1;"></main>
        <footer class="app-footer"><p>Desenvolvido por <strong>Augusto Cruz</strong> - Fisioterapeuta Intensivista</p><p><a href="https://instagram.com/augustocruzfisioterapia" target="_blank">@augustocruzfisioterapia</a></p></footer>
    </div>
    <div class="modal-overlay hidden" id="modalPatient"><div class="modal" id="modalPatientInner"></div></div>
    <div class="modal-overlay hidden" id="modalReport"><div class="modal" id="modalReportInner"></div></div>
    <div class="modal-overlay hidden" id="modalChart"><div class="modal" id="modalChartInner"></div></div>
    <div class="modal-overlay hidden" id="modalDisclaimer"><div class="modal" id="modalDisclaimerInner"></div></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
    </script>
    <script>
        (function() {
            const STORE_KEY = 'psicu_data_v10_fix';
            let store = { patients: [], assessments: {}, goals: {}, quickEvals: [], settings: { darkMode: false } };
            let chartInstances = {};
            let currentOpenToolId = null;

            const DOMAIN_GROUPS = {
                neuro: { label: '🧠 Neuro / Consciência & Delirium', tools: ['gcs','four','rass','sas','nihss','cam_icu','icdsc'] },
                funcional: { label: '💪🚶⚡ Força / Mobilidade / Funcional', tools: ['mrc_ss','ims','soms','jh_hlm','perme','fss_icu','pfit_s','cpax'] },
                dor: { label: '😣 Dor / Conforto', tools: ['eva_nrs','bps','cpot'] }
            };

            function getLayout(options) { return options.length > 6 ? 'vertical' : 'horizontal'; }

            // ============ PERME SCORE CORRIGIDO (7 seções, 17 itens, máximo 32) ============
            const PERME_SECTIONS = [
                {
                    id: 'mental', title: 'Estado Mental', icon: '🧠', max: 3,
                    items: [
                        { id:'perme_m1', label:'Estado de alerta no começo da avaliação', options:[{v:0,t:'Não responsivo'},{v:1,t:'Letárgico'},{v:2,t:'Acordado e alerta'}], layout:'horizontal' },
                        { id:'perme_m2', label:'Paciente consegue seguir 2 entre 3 comandos?', options:[{v:0,t:'Não'},{v:1,t:'Sim'}], layout:'horizontal' }
                    ]
                },
                {
                    id: 'barreiras', title: 'Potenciais Barreiras à Mobilidade', icon: '⚠️', max: 4,
                    items: [
                        { id:'perme_b1', label:'Paciente está em ventilação mecânica ou VNI?', options:[{v:0,t:'Sim'},{v:1,t:'Não'}], layout:'horizontal' },
                        { id:'perme_b2', label:'Dor durante a avaliação ou atividade', options:[{v:0,t:'Incapaz de determinar dor ou paciente indica sentir dor'},{v:1,t:'Sem dor'}], layout:'vertical' },
                        { id:'perme_b3', label:'Paciente apresenta 2 ou mais dispositivos, acessos, tubos, cateteres ou drenos?', help:'Considerar: oxigenoterapia, cateter vesical, TOT, TQT, CVC, acesso periférico, PAI, cateter de diálise, SNG, dreno de tórax, marcapasso, cateter de artéria pulmonar, BIA, DAVE, TRSC, ventriculostomia, dreno lombar, curativo a vácuo.', options:[{v:0,t:'Sim'},{v:1,t:'Não'}], layout:'vertical' },
                        { id:'perme_b4', label:'Paciente está em infusão endovenosa contínua?', help:'Considerar: vasopressores, inotrópicos, insulina, antiarrítmicos, sedação, antibióticos, fluidos, eletrólitos, transfusão.', options:[{v:0,t:'Sim'},{v:1,t:'Não'}], layout:'vertical' }
                    ]
                },
                {
                    id: 'forca', title: 'Força Funcional', icon: '💪', max: 4,
                    items: [
                        { id:'perme_f1', label:'Perna esquerda: erguer contra gravidade ~20°, joelho estendido?', options:[{v:0,t:'Não'},{v:1,t:'Sim'}], layout:'horizontal' },
                        { id:'perme_f2', label:'Perna direita: erguer contra gravidade ~20°, joelho estendido?', options:[{v:0,t:'Não'},{v:1,t:'Sim'}], layout:'horizontal' },
                        { id:'perme_f3', label:'Braço esquerdo: elevar contra gravidade ~45°, cotovelo estendido?', options:[{v:0,t:'Não'},{v:1,t:'Sim'}], layout:'horizontal' },
                        { id:'perme_f4', label:'Braço direito: elevar contra gravidade ~45°, cotovelo estendido?', options:[{v:0,t:'Não'},{v:1,t:'Sim'}], layout:'horizontal' }
                    ]
                },
                {
                    id: 'leito', title: 'Mobilidade no Leito', icon: '🛏️', max: 6,

            function calcPermeScore(items) {
                let total = 0;
                PERME_SECTIONS.forEach(section => {
                    section.items.forEach(item => {
                        if (items[item.id] !== undefined && items[item.id] !== null) {
                            total += items[item.id];
                        }
                    });
                });
                return total;
            }

            function getPermeClassification(score) {
                if (score >= 25) return { label: 'Maior independência funcional e menor barreira à mobilidade', cls: 'badge-up' };
                if (score >= 17) return { label: 'Mobilidade moderada, com participação ativa parcial', cls: 'badge-stable' };
                if (score >= 9) return { label: 'Mobilidade baixa, com alta dependência funcional', cls: 'badge-stable' };

            Object.values(TOOLS).forEach(tool => {

                    tool.items.forEach(item => { item.layout = getLayout(item.options); });

            function loadStore() { const raw = localStorage.getItem(STORE_KEY); if(raw){ try{ store = JSON.parse(raw); }catch(e){} } if(!store.assessments) store.assessments = {}; if(!store.goals) store.goals = {}; if(!store.quickEvals) store.quickEvals = []; if(!store.settings) store.settings = { darkMode: false }; if(!store.patients) store.patients = []; }
            function saveStore(){ localStorage.setItem(STORE_KEY, JSON.stringify(store)); }

            let currentView='home', currentPatientId=null, activeToolScores={}, activeAssessmentId=null, isQuickMode=false;
            function navigate(view, patientId=null){
                currentView=view; currentOpenToolId=null;
                if(view==='home'){ currentPatientId=null; isQuickMode=false; activeToolScores={}; activeAssessmentId=null; }
                if(view==='patient'&&patientId){ currentPatientId=patientId; isQuickMode=false; activeToolScores={}; activeAssessmentId=null; }
                if(view==='newAssessment'){ activeToolScores={}; activeAssessmentId='assess_'+Date.now(); }
                if(view==='quickEval'){ isQuickMode=true; activeToolScores={}; activeAssessmentId='quick_'+Date.now(); currentPatientId=null; }

            function render(){
                const main=document.getElementById('mainContent');

            }
            function renderHome(){

                    <div class="highlight-box"><h3>⚡ Avaliação Rápida</h3><p>Pontue escalas sem cadastrar paciente.</p><button class="btn btn-accent-outline btn-block" id="btnQuickEval">Iniciar Avaliação Rápida</button></div>
                    <div style="display:flex;gap:8px;margin-bottom:10px;"><input type="text" placeholder="🔍 Buscar paciente..." id="searchInput" style="margin-bottom:0;"></div>

                return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;"><button class="btn btn-sm btn-ghost" id="btnBackHome">← Home</button><h2 style="font-size:1.1rem;margin:0;flex:1;">${esc(p.name)} <span style="font-weight:400;font-size:0.8rem;color:var(--text3);">Leito ${esc(p.bed||'?')}</span></h2><button class="btn btn-sm" id="btnEditPatient">✏️</button><button class="btn btn-sm btn-danger" id="btnDeletePatient">🗑️</button></div>

                    <div class="card"><div class="card-header"><span class="ico">📈</span> Tendências</div>${trendsHTML}</div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;"><button class="btn btn-primary" id="btnNewAssessment">+ Nova Avaliação</button><button class="btn" id="btnGoals">🎯 Metas (${goals.filter(g=>!g.completed).length})</button><button class="btn" id="btnEvolReport">📄 Relatório Evolutivo</button><button class="btn" id="btnViewCharts">📊 Gráficos</button></div>

            }
            function renderAssessmentPage(){

                return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;"><button class="btn btn-sm btn-ghost" id="btnBackFromAssess">← Voltar</button><h2 style="font-size:1.1rem;margin:0;">${title}</h2>${isQuickMode?'<span class="badge badge-up" style="margin-left:8px;">⚡ Rápido</span>':''}</div>

            function renderDomainTools(domainKey){

                    const scoreDisplay = hasScore ? activeToolScores[tid].score : null;

            function renderScorer(toolId){
                const tool=TOOLS[toolId]; if(!tool) return '<p>Não encontrada.</p>';
                if(tool.isPerme) return renderPermeScorer();
                const current=activeToolScores[toolId]||{items:{},score:null};
                let html=`<div class="scorer-container">`;
                html+=`<div class="scorer-header">`;
                html+=`<div class="scorer-title">📋 ${tool.name} <small>${tool.fullName||''} (${tool.range})</small></div>`;

                if(tool.illustrationUrl){
                    const illLabel = tool.id==='nihss'?'📄 Escala completa':'🖼️ Ilustração prática';
                    html+=`<a href="${tool.illustrationUrl}" target="_blank" class="btn btn-link">${illLabel}</a>`;
                }
                html+=`</div></div>`;
                if(tool.subtitle) html+=`<div class="scorer-subtitle">${tool.subtitle}</div>`;
                tool.items.forEach(item=>{
                    const selectedVal=current.items[item.id]; const useVertical=item.layout==='vertical';
                    html+=`<div class="scorer-item ${selectedVal!==undefined?'filled':''}" data-tool="${toolId}" data-item="${item.id}"><div class="scorer-label" style="${useVertical?'width:100%;margin-bottom:4px;':''}">${item.label}${item.help?`<small>${item.help}</small>`:''}</div>`;
                    if(useVertical){ html+=`<div class="scorer-radio-vertical">`; item.options.forEach(opt=>{html+=`<span class="radio-opt-vertical${selectedVal===opt.v?' selected':''}" data-val="${opt.v}">${opt.t}</span>`;}); html+=`</div>`; }
                    else { html+=`<div class="scorer-radio">`; item.options.forEach(opt=>{html+=`<span class="radio-opt${selectedVal===opt.v?' selected':''}" data-val="${opt.v}">${opt.t}</span>`;}); html+=`</div>`; }
                    html+=`</div>`;
                });
                const scoreDisplay=current.score!==null&&current.score!==undefined?current.score:'—';
                html+=`<div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:10px;"><span style="font-weight:700;">Escore:</span><div class="scorer-result">${scoreDisplay}</div></div>`;
                if(tool.interpretation&&current.score!==null&&current.score!==undefined) html+=`<div class="interpretation-box">💡 <strong>Interpretação:</strong> ${tool.interpretation(current.score)}</div>`;
                html+=`<button class="btn btn-sm btn-ghost mt-8" data-remove-tool="${toolId}">🗑️ Remover</button></div>`;
                return html;
            }
            function renderPermeScorer(){
                const current=activeToolScores['perme']||{items:{},score:null};
                let html=`<div class="scorer-container">`;
                html+=`<div class="scorer-header">`;
                html+=`<div class="scorer-title">📋 Perme <small>Perme ICU Mobility Score (0-32)</small></div>`;
                html+=`<div class="scorer-links">`;
                html+=`<a href="https://www.scielo.br/j/jbpneu/a/bmQQH8tc6TsLVsKj9ytdr7c/?format=pdf&lang=pt" target="_blank" class="btn btn-link">🔗 Validação do Score</a>`;
                html+=`<a href="https://www.jornaldepneumologia.com.br/Content/imagebank/pdf/3_provenv_aop_jbp_0301_anexo_pt.pdf" target="_blank" class="btn btn-link">📄 Escala completa</a>`;
                html+=`</div></div>`;
                html+=`<div class="scorer-subtitle">Avaliação estruturada da mobilidade funcional do paciente crítico. 7 seções, 17 itens.</div>`;

                // Progress bar
                const totalScore=calcPermeScore(current.items);
                let progressClass='progress-low';
                if(totalScore>=17) progressClass='progress-mid';
                if(totalScore>=25) progressClass='progress-high';
                html+=`<div class="progress-bar-container"><div class="progress-bar-fill ${progressClass}" style="width:${(totalScore/32)*100}%"></div></div>`;
                html+=`<div style="text-align:center;font-size:0.8rem;font-weight:700;color:var(--accent);margin-bottom:8px;">${totalScore} / 32 pontos</div>`;

                // Sections
                PERME_SECTIONS.forEach((section,idx)=>{
                    const isOpen=idx===0;
                    let sectionScore=0;
                    section.items.forEach(item=>{if(current.items[item.id]!==undefined&&current.items[item.id]!==null) sectionScore+=current.items[item.id];});
                    html+=`<div class="perme-section">`;
                    html+=`<div class="perme-section-header ${isOpen?'open':''}" data-perme-section="${section.id}">`;
                    html+=`<span class="section-icon">${section.icon}</span>`;
                    html+=`<span>${section.title}</span>`;
                    html+=`<span class="section-subtotal">${sectionScore}/${section.max}</span>`;
                    html+=`<span class="section-arrow">▶</span>`;
                    html+=`</div>`;
                    html+=`<div class="perme-section-body ${isOpen?'open':''}" data-perme-section-body="${section.id}">`;
                    section.items.forEach(item=>{
                        const selectedVal=current.items[item.id];
                        const useVertical=item.layout==='vertical';
                        html+=`<div class="scorer-item ${selectedVal!==undefined?'filled':''}" data-tool="perme" data-item="${item.id}">`;
                        html+=`<div class="scorer-label" style="${useVertical?'width:100%;margin-bottom:4px;':''}">${item.label}${item.help?`<small>${item.help}</small>`:''}</div>`;
                        if(useVertical){
                            html+=`<div class="scorer-radio-vertical">`;
                            item.options.forEach(opt=>{html+=`<span class="radio-opt-vertical${selectedVal===opt.v?' selected':''}" data-val="${opt.v}">${opt.t}</span>`;});
                            html+=`</div>`;
                        } else {
                            html+=`<div class="scorer-radio">`;
                            item.options.forEach(opt=>{html+=`<span class="radio-opt${selectedVal===opt.v?' selected':''}" data-val="${opt.v}">${opt.t}</span>`;});
                            html+=`</div>`;
                        }
                        html+=`</div>`;
                    });
                    html+=`</div></div>`;
                });

                // Subtotal cards
                html+=`<div class="subtotal-cards">`;
                PERME_SECTIONS.forEach(section=>{
                    let sectionScore=0;
                    section.items.forEach(item=>{if(current.items[item.id]!==undefined&&current.items[item.id]!==null) sectionScore+=current.items[item.id];});
                    html+=`<div class="subtotal-card"><span>${section.icon}</span><br><span class="sub-val">${sectionScore}</span><br><span class="sub-max">/ ${section.max}</span></div>`;
                });
                html+=`</div>`;

                const finalClassification=getPermeClassification(totalScore);
                html+=`<div class="perme-final-result">`;
                html+=`<div class="perme-final-label">Resultado final da Perme Score</div>`;
                html+=`<div><span class="perme-final-score">${totalScore}</span><span class="perme-final-max">/ 32 pontos</span></div>`;
                html+=`<div class="perme-final-classification">${finalClassification.label}</div>`;
                html+=`</div>`;

                // Interpretation
                if(totalScore>0||Object.keys(current.items).length>0){
                    const classification=getPermeClassification(totalScore);
                    html+=`<div class="interpretation-box">💡 <strong>Interpretação:</strong> ${classification.label}</div>`;
                    // Find most limited section
                    let minPct=100, minSection='';
                    PERME_SECTIONS.forEach(section=>{
                        let sectionScore=0;
                        section.items.forEach(item=>{if(current.items[item.id]!==undefined&&current.items[item.id]!==null) sectionScore+=current.items[item.id];});
                        const pct=section.max>0?(sectionScore/section.max)*100:0;
                        if(pct<minPct){minPct=pct;minSection=section.title;}
                    });
                    if(minSection){
                        html+=`<div class="interpretation-box" style="margin-top:4px;">📌 <strong>Maior limitação:</strong> ${minSection} (${minPct.toFixed(0)}% do máximo)</div>`;
                    }
                }
                html+=`<button class="btn btn-sm btn-ghost mt-8" data-remove-tool="perme">🗑️ Remover</button></div>`;
                return html;
            }
            function renderTrends(assessments){
                const rows=getPatientTrendRows(assessments);
                if(rows.length===0) return '<p class="text-muted text-sm">Realize ao menos uma escala pontuada para gerar tendência.</p>';
                let html='<div style="display:flex;gap:6px;flex-wrap:wrap;">';
                rows.forEach(row=>{
                    html+=`<span class="badge ${row.cls}" title="${row.fullName}">${row.label}: ${row.firstScoreText} ${row.arrow} ${row.lastScoreText}${row.deltaText}</span>`;
                });
                html+='</div>';
                return html;
            }
            function getToolScore(assessment,toolId){
                if(!assessment?.tools?.[toolId])return null;
                const score=assessment.tools[toolId].score;
                return score===undefined?null:score;
            }
            function isNumericScore(value){
                return typeof value==='number' && Number.isFinite(value);
            }
            function formatTrendScore(value){
                if(value===null||value===undefined||value==='') return '—';
                return String(value);
            }
            function getUsedToolIds(assessments){
                const ids=[];
                const seen=new Set();
                assessments.forEach(a=>{
                    Object.keys(a.tools||{}).forEach(tid=>{
                        const score=getToolScore(a,tid);
                        if(score!==null&&score!==undefined&&score!==''&&!seen.has(tid)){
                            seen.add(tid);
                            ids.push(tid);
                        }
                    });
                });
                return ids;
            }
            function getPatientTrendRows(assessments){
                const sorted=[...assessments].sort((a,b)=>new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00')));
                const rows=[];
                getUsedToolIds(sorted).forEach(tid=>{
                    const tool=TOOLS[tid];
                    const registros=sorted.filter(a=>{
                        const score=getToolScore(a,tid);
                        return score!==null&&score!==undefined&&score!=='';
                    });
                    if(registros.length===0)return;
                    const first=registros[0];
                    const last=registros[registros.length-1];
                    const firstScore=getToolScore(first,tid);
                    const lastScore=getToolScore(last,tid);
                    let cls='badge-stable',arrow='→',deltaText='';
                    if(isNumericScore(firstScore)&&isNumericScore(lastScore)){
                        const diff=lastScore-firstScore;
                        if(diff>0){cls='badge-up';arrow='↑';deltaText=` (Δ +${diff})`;}
                        else if(diff<0){cls='badge-down';arrow='↓';deltaText=` (Δ ${diff})`;}
                        else {deltaText=' (Δ 0)';}
                    } else if(String(firstScore)!==String(lastScore)){
                        cls='badge-stable';
                        arrow='→';
                        deltaText=' (mudança registrada)';
                    } else {
                        deltaText=' (mantido)';
                    }
                    rows.push({
                        toolId:tid,
                        label:tool?.name||tid,
                        fullName:tool?.fullName||'',
                        firstAssessment:first,
                        lastAssessment:last,
                        firstScore:firstScore,
                        lastScore:lastScore,
                        firstScoreText:formatTrendScore(firstScore),
                        lastScoreText:formatTrendScore(lastScore),
                        firstDate:fmtDate(first.date),
                        lastDate:fmtDate(last.date),
                        firstTime:first.time||'',
                        lastTime:last.time||'',
                        count:registros.length,
                        cls,arrow,deltaText
                    });
                });
                return rows;
            }
            function buildEvolReportText(patient,assessments){
                const rows=getPatientTrendRows(assessments);
                let text=`RELATÓRIO EVOLUTIVO - PhysioScore ICU
==============================
Paciente: ${patient.name} | Leito: ${patient.bed||'—'}
`;
                if(patient.age||patient.sex) text+=`Idade: ${patient.age||'—'} | Sexo: ${patient.sex||'—'}
`;
                if(patient.diagnosis) text+=`Diagnóstico: ${patient.diagnosis}
`;
                text+=`
RESULTADOS POR ESCALA
------------------------------
`;
                if(rows.length===0){
                    text+=`Nenhuma escala pontuada encontrada neste paciente.
------------------------------
`;
                } else {
                    rows.forEach(row=>{

            // ============ NOVA FUNÇÃO: Atualiza visuais da Perme sem recriar HTML ============
            function updatePermeVisuals(container) {
                const current = activeToolScores['perme'] || {items:{},score:null};
                const totalScore = calcPermeScore(current.items);
                
                // Atualiza barra de progresso superior
                const progressFill = container.querySelector('.progress-bar-fill');
                if(progressFill) {
                    let progressClass = 'progress-low';
                    if(totalScore >= 17) progressClass = 'progress-mid';
                    if(totalScore >= 25) progressClass = 'progress-high';
                    progressFill.className = 'progress-bar-fill ' + progressClass;
                    progressFill.style.width = ((totalScore/32)*100) + '%';
                }
                
                // Atualiza texto de pontuação
                const scoreText = container.querySelector('.scorer-subtitle + div + div');
                if(scoreText) {
                    scoreText.textContent = totalScore + ' / 32 pontos';
                }
                
                // Atualiza subtotais nos cabeçalhos das seções
                const sectionHeaders = container.querySelectorAll('.perme-section-header[data-perme-section]');
                sectionHeaders.forEach(header => {
                    const sectionId = header.getAttribute('data-perme-section');
                    const section = PERME_SECTIONS.find(s => s.id === sectionId);
                    if(section) {
                        let sectionScore = 0;
                        section.items.forEach(item => {
                            if(current.items[item.id] !== undefined && current.items[item.id] !== null) {
                                sectionScore += current.items[item.id];
                            }
                        });
                        const subtotalSpan = header.querySelector('.section-subtotal');
                        if(subtotalSpan) {
                            subtotalSpan.textContent = sectionScore + '/' + section.max;
                        }
                    }
                });
                
                // Atualiza subtotal cards
                const subtotalCards = container.querySelectorAll('.subtotal-card');
                subtotalCards.forEach((card, idx) => {
                    if(idx < PERME_SECTIONS.length) {
                        const section = PERME_SECTIONS[idx];
                        let sectionScore = 0;
                        section.items.forEach(item => {
                            if(current.items[item.id] !== undefined && current.items[item.id] !== null) {
                                sectionScore += current.items[item.id];
                            }
                        });
                        const subVal = card.querySelector('.sub-val');
                        if(subVal) subVal.textContent = sectionScore;
                    }
                });
                
                // Atualiza resultado final grande
                const finalScoreEl = container.querySelector('.perme-final-score');
                if(finalScoreEl) finalScoreEl.textContent = totalScore;
                const finalClassificationEl = container.querySelector('.perme-final-classification');
                if(finalClassificationEl) finalClassificationEl.textContent = getPermeClassification(totalScore).label;

                // Atualiza interpretação e maior limitação
                const interpretationBoxes = container.querySelectorAll('.interpretation-box');
                if(interpretationBoxes.length > 0 && (totalScore > 0 || Object.keys(current.items).length > 0)) {
                    const classification = getPermeClassification(totalScore);
                    interpretationBoxes[0].innerHTML = '💡 <strong>Interpretação:</strong> ' + classification.label;
                    
                    if(interpretationBoxes.length > 1) {
                        let minPct = 100, minSection = '';
                        PERME_SECTIONS.forEach(section => {
                            let sectionScore = 0;
                            section.items.forEach(item => {
                                if(current.items[item.id] !== undefined && current.items[item.id] !== null) {
                                    sectionScore += current.items[item.id];
                                }
                            });
                            const pct = section.max > 0 ? (sectionScore/section.max)*100 : 0;
                            if(pct < minPct) { minPct = pct; minSection = section.title; }
                        });
                        if(minSection) {
                            interpretationBoxes[1].innerHTML = '📌 <strong>Maior limitação:</strong> ' + minSection + ' (' + minPct.toFixed(0) + '% do máximo)';
                        }
                    }
                }
                
                // Atualiza apenas o card da Perme no grid, sem recriar o activeScorer
                const permeCard = document.querySelector('.tool-card[data-tool="perme"]');
                if(permeCard) {
                    let scoreEl = permeCard.querySelector('small');
                    if(!scoreEl) {
                        scoreEl = document.createElement('small');
                        scoreEl.style.fontWeight = '700';
                        permeCard.appendChild(scoreEl);
                    }
                    scoreEl.textContent = totalScore;
                }
            }

            function copyTextToClipboard(text,successMessage){
                if(navigator.clipboard && window.isSecureContext){
                    navigator.clipboard.writeText(text).then(()=>alert(successMessage||'Texto copiado!')).catch(()=>fallbackCopyText(text,successMessage));
                } else {
                    fallbackCopyText(text,successMessage);
                }
            }
            function fallbackCopyText(text,successMessage){
                const temp=document.createElement('textarea');
                temp.value=text;
                temp.setAttribute('readonly','');
                temp.style.position='fixed';
                temp.style.top='-1000px';
                temp.style.left='-1000px';
                document.body.appendChild(temp);
                temp.focus();
                temp.select();
                let copied=false;
                try{copied=document.execCommand('copy');}catch(e){copied=false;}
                document.body.removeChild(temp);
                if(copied) alert(successMessage||'Texto copiado!');
                else {
                    const preview=document.getElementById('evolReportTextPreview');
                    if(preview){preview.focus();preview.select();}
                    alert('Não consegui atualizar a área de transferência automaticamente. O texto ficou selecionado na janela para copiar manualmente.');
                }
            }

            function showFullDisclaimer(){document.getElementById('modalDisclaimerInner').innerHTML=`<h3>⚠️ Disclaimer Clínico</h3><p>Ferramenta de apoio. <strong>Não:</strong></p><ul style="padding-left:18px;line-height:2;"><li>Prescreve condutas</li><li>Define segurança</li><li>Substitui protocolos</li><li>Substitui avaliação multiprofissional</li><li>Realiza diagnóstico</li><li>Automatiza decisões</li></ul><p><strong>Toda decisão é de responsabilidade do profissional assistente.</strong></p><button class="btn btn-primary" id="btnCloseDisclaimer">Entendi</button>`;document.getElementById('modalDisclaimer').classList.remove('hidden');document.getElementById('btnCloseDisclaimer').onclick=()=>document.getElementById('modalDisclaimer').classList.add('hidden');}

            function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});chartInstances={};}
            function showChartsModal(){
                const assessments=store.assessments[currentPatientId]||[],p=store.patients.find(x=>x.id===currentPatientId);if(!p)return;
                if(assessments.length<2){alert('Necessário ao menos 2 avaliações.');return;}
                const sorted=[...assessments].sort((a,b)=>new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00')));
                const toolIds=Object.keys(TOOLS).filter(tid=>sorted.some(a=>a.tools?.[tid]?.score!=null));
                if(toolIds.length===0){alert('Nenhuma ferramenta pontuada.');return;}
                let html=`<h3>📊 Gráficos - ${esc(p.name)}</h3><div style="max-height:70vh;overflow-y:auto;">`;
                toolIds.forEach(tid=>{
                    const tool=TOOLS[tid]; if(!tool)return;
                    const dataPoints=sorted.filter(a=>a.tools?.[tid]?.score!=null).map(a=>({date:fmtDate(a.date),score:a.tools[tid].score}));
                    if(dataPoints.length<2)return;
                    if(tool.isRadar){
                        const first=sorted.find(a=>a.tools?.[tid]?.score!=null);
                        const last=[...sorted].reverse().find(a=>a.tools?.[tid]?.score!=null);
                        const firstScore=first?.tools[tid]?.score??'?';
                        const lastScore=last?.tools[tid]?.score??'?';
                        const diff=lastScore!=='?'&&firstScore!=='?'?lastScore-firstScore:null;
                        html+=`<div class="card"><div class="card-header">🕸️ ${tool.name} (Radar)</div>
                            <div class="chart-container"><canvas id="radar_${tid}" width="380" height="380"></canvas></div>
                            <div class="radar-legend">
                                <span><span class="legend-dash"></span> Linha de base (${fmtDate(first?.date||'?')})</span>
                                <span><span class="legend-solid"></span> Atual (${fmtDate(last?.date||'?')})</span>
                            </div>
                            ${diff!==null?`<p class="text-xs text-muted" style="text-align:center;">Evolução: ${firstScore} → ${lastScore} (${diff>=0?'+':''}${diff} pontos | ${firstScore>0?((diff/firstScore)*100).toFixed(0):0}%)</p>`:''}
                        </div>`;
                    } else {
                        html+=`<div class="card"><div class="card-header">📈 ${tool.name}</div><div class="line-chart-container"><canvas id="line_${tid}" width="500" height="180"></canvas></div></div>`;
                    }
                });
                html+=`</div><button class="btn mt-8" id="btnCloseCharts">Fechar</button>`;
                document.getElementById('modalChartInner').innerHTML=html;
                document.getElementById('modalChart').classList.remove('hidden');
                document.getElementById('btnCloseCharts').onclick=()=>{destroyCharts();document.getElementById('modalChart').classList.add('hidden');};
                setTimeout(()=>{
                    toolIds.forEach(tid=>{
                        const tool=TOOLS[tid]; if(!tool)return;
                        const dataPoints=sorted.filter(a=>a.tools?.[tid]?.score!=null).map(a=>({date:fmtDate(a.date),score:a.tools[tid].score}));
                        if(dataPoints.length<2)return;
                        if(tool.isRadar){
                            const first=sorted.find(a=>a.tools?.[tid]?.score!=null);
                            const last=[...sorted].reverse().find(a=>a.tools?.[tid]?.score!=null);
                            if(first&&last&&first.tools[tid].items&&last.tools[tid].items) renderRadarChart(tid,tool,first.tools[tid].items,last.tools[tid].items,first,last);
                        } else {
                            renderLineChart(tid,tool.name,dataPoints);
                        }
                    });
                },300);
            }
            function renderLineChart(tid,label,dataPoints){
                const ctx=document.getElementById('line_'+tid); if(!ctx)return;
                if(chartInstances['line_'+tid]) chartInstances['line_'+tid].destroy();
                chartInstances['line_'+tid]=new Chart(ctx,{type:'line',data:{labels:dataPoints.map(d=>d.date),datasets:[{label:label,data:dataPoints.map(d=>d.score),borderColor:'#0d9488',backgroundColor:'rgba(13,148,136,0.1)',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:'#0d9488'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,0.06)'}}}}});
            }
            function renderRadarChart(tid,tool,firstItems,lastItems,firstAssess,lastAssess){
                const ctx=document.getElementById('radar_'+tid); if(!ctx)return;
                if(chartInstances['radar_'+tid]) chartInstances['radar_'+tid].destroy();
                const labels=tool.items.map(i=>i.label);
                const firstData=tool.items.map(i=>firstItems[i.id]??0);
                const lastData=tool.items.map(i=>lastItems[i.id]??0);
                chartInstances['radar_'+tid]=new Chart(ctx,{type:'radar',data:{labels:labels,datasets:[
                    {label:'Linha de base ('+fmtDate(firstAssess?.date||'?')+')',data:firstData,borderColor:'rgba(13,148,136,0.4)',backgroundColor:'rgba(13,148,136,0.05)',borderWidth:1.5,borderDash:[6,4],pointRadius:3,pointBackgroundColor:'rgba(13,148,136,0.4)',pointBorderColor:'rgba(13,148,136,0.4)'},
                    {label:'Atual ('+fmtDate(lastAssess?.date||'?')+')',data:lastData,borderColor:'#0d9488',backgroundColor:'rgba(13,148,136,0.2)',borderWidth:3,pointRadius:5,pointBackgroundColor:'#0d9488',pointBorderColor:'#fff',pointBorderWidth:2}
                ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{r:{beginAtZero:true,max:5,ticks:{stepSize:1,font:{size:9}},grid:{color:'rgba(0,0,0,0.1)'},pointLabels:{font:{size:9}}}}}});
            }

            function toggleDark(){store.settings.darkMode=!store.settings.darkMode;applyDark();saveStore();}
            function applyDark(){if(store.settings.darkMode){document.body.classList.add('dark');document.getElementById('darkToggle').innerHTML='☀️';}else{document.body.classList.remove('dark');document.getElementById('darkToggle').innerHTML='🌙';}}
            function today(){return new Date().toISOString().split('T')[0];}
            function nowTime(){return new Date().toTimeString().slice(0,5);}
            function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
            function utiDays(ad){if(!ad)return'?';return Math.max(0,Math.floor((new Date()-new Date(ad+'T00:00:00'))/86400000));}
            function initials(n){if(!n)return'?';const p=n.trim().split(/\s+/);return p.length>1?(p[0][0]+p[p.length-1][0]).toUpperCase():p[0].slice(0,2).toUpperCase();}
            function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
            function filterPatients(){const q=document.getElementById('searchInput')?.value?.toLowerCase()||'';const patients=store.patients.filter(p=>!p.deleted);const filtered=patients.filter(p=>p.name.toLowerCase().includes(q)||(p.bed||'').toLowerCase().includes(q));const container=document.getElementById('patientList');if(container){container.innerHTML=filtered.length===0?'<div class="empty-msg">Nenhum.</div>':filtered.map(p=>`<div class="patient-row" data-pid="${p.id}"><div class="pat-avatar">${initials(p.name)}</div><div class="pat-name">${esc(p.name)}</div><div class="pat-bed">Leito ${esc(p.bed||'?')}</div></div>`).join('');container.querySelectorAll('.patient-row[data-pid]').forEach(el=>{el.onclick=function(){navigate('patient',this.dataset.pid);}});}}
            document.addEventListener('click',function(e){if(e.target.classList.contains('modal-overlay'))e.target.classList.add('hidden');});
            function init(){loadStore();applyDark();if(!localStorage.getItem('psicu_disc_v10_fix')){localStorage.setItem('psicu_disc_v10_fix','1');setTimeout(showFullDisclaimer,600);}navigate('home');}
            init();
        })();
    </script>
    <script>
        // Registro do Service Worker para funcionamento como PWA.
        // O arquivo usado no repositório é "ws.js". Se você renomear para "sw.js" ou "service-worker.js",
        // atualize o caminho abaixo.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./ws.js')
                    .then(function(registration) {
                        console.log('PhysioScore ICU: Service Worker registrado com sucesso:', registration.scope);
                    })
                    .catch(function(error) {
                        console.error('PhysioScore ICU: erro ao registrar o Service Worker:', error);
                    });
            });
        }
    </script>
